name: Frontend Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'web/**'
      - '.github/workflows/frontend-tests.yml'
  push:
    branches:
      - master
      - develop
    paths:
      - 'web/**'
      - '.github/workflows/frontend-tests.yml'

jobs:
  playwright-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.9.2

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        working-directory: web
        run: |
          set +e
          npm audit --json > npm-audit.json
          audit_json_exit=$?
          node -e "const audit = require('./npm-audit.json'); if (!audit.metadata || !audit.metadata.vulnerabilities) process.exit(1)"
          json_valid=$?
          npm audit --omit=dev --audit-level=high
          production_audit_exit=$?
          set -e
          if [ "$json_valid" -ne 0 ]; then
            echo "npm audit could not produce a vulnerability report; check npm registry connectivity."
            exit 1
          fi
          if [ "$production_audit_exit" -ne 0 ]; then
            echo "Production dependency audit found high or critical vulnerabilities."
            exit "$production_audit_exit"
          fi
          if [ "$audit_json_exit" -ne 0 ]; then
            echo "Full audit contains non-production findings; see npm-audit.json."
          fi

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: web/npm-audit.json
          if-no-files-found: error

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: web
        run: pnpm test:e2e
